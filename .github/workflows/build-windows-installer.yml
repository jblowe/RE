name: Build Windows Installer

# Triggers:
#   - Manually from the Actions tab (Run workflow button) — use this for testing
#   - Automatically on every version tag push (e.g. git tag v1.2 && git push --tags)
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    paths:
      - 'installer/**'
      - 'src/**'
      - 'REwww/**'
      - 'styles/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Download MSYS2 installer
        # Pin to a specific date for reproducible builds.
        # Update this periodically to get a newer MSYS2 base.
        run: |
          $version = "20241208"
          $url = "https://github.com/msys2/msys2-installer/releases/download/$version/msys2-x86_64-$version.exe"
          Write-Host "Downloading MSYS2 $version..."
          Invoke-WebRequest -Uri $url -OutFile "installer\msys2-installer.exe"
        shell: pwsh

      - name: Create output directory
        run: New-Item -ItemType Directory -Force installer\dist
        shell: pwsh

      - name: Compile installer
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc installer\RE-installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        shell: pwsh

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: RE-setup-windows
          path: installer/dist/RE-setup.exe
          retention-days: 30

      # Attach to GitHub Release when triggered by a tag push
      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/dist/RE-setup.exe
